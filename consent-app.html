<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nenu — Consent to share</title>
    <style>
      :root {
        --bg: #ffffff;
        --fg: #16181d;
        --muted: #5b6472;
        --line: #e6e8ec;
        --card: #f7f8fa;
        --brand: #4338ca;
        --brand-fg: #ffffff;
        --ok: #0f7b4f;
        --warn: #9a6700;
        --high: #b42318;
        --radius: 12px;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #16181d;
          --fg: #eceef2;
          --muted: #9aa3b2;
          --line: #2a2e37;
          --card: #1d2027;
          --brand: #8b85f0;
          --brand-fg: #16181d;
          --ok: #4ec38a;
          --warn: #e0b341;
          --high: #f08a80;
        }
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
        color: var(--fg);
        background: transparent;
      }
      .wrap { max-width: 560px; padding: 4px; }
      .head { display: flex; align-items: center; gap: 8px; margin-bottom: 2px; }
      .dot {
        width: 18px; height: 18px; border-radius: 50%;
        background: var(--brand); flex: 0 0 auto;
      }
      .head h1 { font-size: 15px; margin: 0; font-weight: 650; }
      .sub { color: var(--muted); margin: 2px 0 14px; }
      .rows { display: flex; flex-direction: column; gap: 8px; }
      .row {
        display: grid; grid-template-columns: 22px 1fr auto; gap: 10px;
        align-items: start; padding: 11px 12px; background: var(--card);
        border: 1px solid var(--line); border-radius: var(--radius);
      }
      .row input[type="checkbox"] { width: 16px; height: 16px; margin-top: 2px; }
      .row .label { font-weight: 600; }
      .row .value { color: var(--fg); }
      .row .value.masked { color: var(--muted); font-style: italic; }
      .row .meta { color: var(--muted); font-size: 12px; margin-top: 3px; }
      .chip {
        font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 999px;
        border: 1px solid var(--line); white-space: nowrap; color: var(--muted);
      }
      .chip.low { color: var(--ok); border-color: color-mix(in srgb, var(--ok) 40%, var(--line)); }
      .chip.medium { color: var(--warn); border-color: color-mix(in srgb, var(--warn) 40%, var(--line)); }
      .chip.high { color: var(--high); border-color: color-mix(in srgb, var(--high) 40%, var(--line)); }
      .rulehint { font-size: 11px; color: var(--muted); margin-top: 3px; }
      .actions { display: flex; gap: 8px; margin-top: 14px; }
      button {
        font: inherit; font-weight: 600; border-radius: 9px; padding: 9px 14px;
        border: 1px solid var(--line); background: var(--bg); color: var(--fg);
        cursor: pointer;
      }
      button.primary { background: var(--brand); color: var(--brand-fg); border-color: var(--brand); }
      button:disabled { opacity: 0.5; cursor: default; }
      .foot { color: var(--muted); font-size: 12px; margin-top: 12px; }
      .done { padding: 12px; border: 1px solid var(--line); border-radius: var(--radius); background: var(--card); }
      .done h2 { font-size: 14px; margin: 0 0 8px; }
      .led { display: flex; justify-content: space-between; align-items: center; gap: 10px; padding: 7px 0; border-top: 1px dashed var(--line); }
      .led:first-of-type { border-top: 0; }
      .led .src { color: var(--muted); font-size: 12px; }
      .led button { padding: 4px 9px; font-size: 12px; }
      .hidden { display: none; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="head">
        <span class="dot" aria-hidden="true"></span>
        <h1>Nenu wants to share with this assistant</h1>
      </div>
      <p class="sub" id="sub">
        Choose what leaves your vault. Nothing is shared until you approve.
      </p>

      <div id="picker">
        <div class="rows" id="rows"></div>
        <div class="actions">
          <button class="primary" id="share">Share selected</button>
          <button id="decline">Decline all</button>
        </div>
        <p class="foot" id="foot"></p>
      </div>

      <div id="result" class="done hidden"></div>
    </div>
    <script type="module" src="/src/consent-app.ts"></script>
  </body>
</html>
